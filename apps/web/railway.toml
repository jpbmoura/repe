[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @repe/web build"
watchPatterns = ["apps/web/**", "packages/shared/**", "packages/ui/**"]

[deploy]
startCommand = "pnpm --filter @repe/web start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

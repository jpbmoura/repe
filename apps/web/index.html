<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0C" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/repe-icon.svg" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Repê" />

    <title>Repê</title>

    <style>
      html,
      body {
        margin: 0;
        background: #0b0b0c;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0b0c;
        opacity: 0;
        animation: app-splash-in 200ms ease-out forwards;
        transition: opacity 300ms ease-out;
      }
      #app-splash svg {
        width: 140px;
        height: auto;
      }
      body.app-mounted #app-splash {
        opacity: 0;
        pointer-events: none;
      }
      body.app-splash-done #app-splash {
        display: none;
      }
      @keyframes app-splash-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
        <text
          x="0"
          y="78"
          font-family="Inter, system-ui, sans-serif"
          font-weight="800"
          font-size="86"
          letter-spacing="-4"
          fill="#F2F0EC"
        >
          repe
        </text>
        <path
          d="M 139 38 L 155 24 L 171 38"
          stroke="#FF6B35"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
      </svg>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
